ue-mcp:
  version: 1

# Project-specific task configurations
# Define named tasks that pre-fill options for built-in actions.
# All 300+ built-in actions are available without listing them here.
#
# tasks:
#   import_hero:
#     class_path: ue-mcp.bridge
#     options:
#       method: import_skeletal_mesh
#       filePath: Meshes/hero_sk.fbx
#       packagePath: /Game/Characters/Hero

tasks: {}

# Flows compose tasks into repeatable multi-step sequences.
# Steps run in numeric order. Each step references a task by name
# (built-in like "level.create" or custom from the tasks section above).
#
# flows:
#   fresh_level:
#     description: Blank level with basic lighting
#     steps:
#       1:
#         task: level.create
#         options:
#           name: Sandbox
#       2:
#         task: level.spawn_light
#         options:
#           type: DirectionalLight
#       3:
#         task: editor.build_all
#
# Environment overlays: ue-mcp.ci.yml, ue-mcp.local.yml (never committed)

flows: {}
